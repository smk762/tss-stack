<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TSS Dev UI</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 820px; }
      textarea { width: 100%; min-height: 140px; font-size: 16px; padding: 12px; border-radius: 10px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
      button { padding: 10px 14px; border-radius: 10px; border: 1px solid; cursor: pointer; }
      select, input { padding: 10px 12px; border-radius: 10px; border: 1px solid; }
      .card { margin-top: 14px; padding: 12px; border: 1px solid; border-radius: 12px; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
      .control { display: grid; grid-template-columns: 170px 1fr 80px; gap: 10px; align-items: center; }
      .control label { font-weight: 600; }
      .control input[type="range"] { width: 100%; }
      .status { margin-top: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; }
      audio { width: 100%; margin-top: 12px; }
    </style>
  </head>
  <body>
    <h2>TSS Dev UI</h2>
    <p>Type text, click <b>Test voice</b>, and the browser will play the synthesized audio.</p>

    <label for="text">Text</label>
    <textarea id="text">Hello! This is a browser playback test.</textarea>

    <div class="row">
      <label for="voice">Voice</label>
      <select id="voice">
        <option value="female" selected>female</option>
        <option value="male">male</option>
        <option value="inara">inara</option>
      </select>

      <label for="snapcast">Also play on Snapcast</label>
      <input id="snapcast" type="checkbox" />

      <button id="btn">Test voice</button>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
        <h3 style="margin:0;">Voice controls</h3>
        <button id="reset">Reset</button>
      </div>
      <div id="controls" class="grid" style="margin-top:10px;"></div>
      <div id="controlsHint" style="opacity:0.8; margin-top:8px;"></div>
    </div>

    <audio id="player" controls></audio>
    <div id="status" class="status"></div>

    <script>
      const statusEl = document.getElementById("status");
      const btn = document.getElementById("btn");
      const resetBtn = document.getElementById("reset");
      const player = document.getElementById("player");
      const controlsEl = document.getElementById("controls");
      const controlsHintEl = document.getElementById("controlsHint");

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      let capabilities = null;
      const controlsState = {}; // key -> { value, spec }

      function setStatus(obj) {
        statusEl.textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
      }

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      function toNumberMaybe(x) {
        if (x === null || x === undefined || x === "") return null;
        const n = Number(x);
        return Number.isFinite(n) ? n : null;
      }

      function renderControlsFromCapabilities(caps) {
        controlsEl.innerHTML = "";
        controlsHintEl.textContent = "";
        Object.keys(controlsState).forEach((k) => delete controlsState[k]);

        const spec = caps?.tts?.controls;
        if (!spec) {
          controlsHintEl.textContent = "No controls advertised by /v1/capabilities.";
          return;
        }

        const entries = Object.entries(spec);
        if (!entries.length) {
          controlsHintEl.textContent = "No controls advertised by /v1/capabilities.";
          return;
        }

        for (const [key, cfg] of entries) {
          const enabled = cfg?.enabled !== false;
          if (!enabled) continue;

          // Enum control (select)
          if (Array.isArray(cfg?.options) && cfg.options.length) {
            const def = cfg.default ?? cfg.options[0];
            controlsState[key] = { value: String(def), spec: { kind: "enum", options: cfg.options, def: String(def) } };

            const row = document.createElement("div");
            row.className = "control";

            const lab = document.createElement("label");
            lab.textContent = key;

            const sel = document.createElement("select");
            sel.dataset.key = key;
            for (const opt of cfg.options) {
              const o = document.createElement("option");
              o.value = opt;
              o.textContent = opt;
              if (String(opt) === String(def)) o.selected = true;
              sel.appendChild(o);
            }

            const val = document.createElement("div");
            val.style.textAlign = "right";
            val.textContent = String(def);

            sel.addEventListener("change", (e) => {
              const k = e.target.dataset.key;
              const v = String(e.target.value);
              controlsState[k].value = v;
              val.textContent = v;
            });

            row.appendChild(lab);
            row.appendChild(sel);
            row.appendChild(val);
            controlsEl.appendChild(row);
            continue;
          }

          const min = toNumberMaybe(cfg.min);
          const max = toNumberMaybe(cfg.max);
          const def = toNumberMaybe(cfg.default);
          const step = toNumberMaybe(cfg.step) ?? 0.01;
          if (min === null || max === null || def === null) continue;

          controlsState[key] = { value: def, spec: { kind: "range", min, max, def, step } };

          const row = document.createElement("div");
          row.className = "control";

          const lab = document.createElement("label");
          lab.textContent = key;

          const input = document.createElement("input");
          input.type = "range";
          input.min = String(min);
          input.max = String(max);
          input.step = String(step);
          input.value = String(def);
          input.dataset.key = key;

          const val = document.createElement("div");
          val.style.textAlign = "right";
          val.textContent = String(def);

          input.addEventListener("input", (e) => {
            const k = e.target.dataset.key;
            const cfg2 = controlsState[k]?.spec;
            if (!cfg2) return;
            const v = clamp(Number(e.target.value), cfg2.min, cfg2.max);
            controlsState[k].value = v;
            val.textContent = String(v);
          });

          row.appendChild(lab);
          row.appendChild(input);
          row.appendChild(val);
          controlsEl.appendChild(row);
        }

        if (!controlsEl.children.length) {
          controlsHintEl.textContent = "Controls exist but are disabled by capabilities.";
        } else {
          controlsHintEl.textContent = "These ranges come from /v1/capabilities (deployment-controlled).";
        }
      }

      function currentControlsPayload() {
        const out = {};
        for (const [k, v] of Object.entries(controlsState)) {
          if (v?.spec && v?.value !== null && v?.value !== undefined) out[k] = v.value;
        }
        return Object.keys(out).length ? out : null;
      }

      async function pollJob(statusUrl) {
        for (let i = 0; i < 200; i++) {
          const r = await fetch(statusUrl, { headers: { "Accept": "application/json" } });
          const j = await r.json();
          setStatus(j);
          if (j.status === "succeeded") return j;
          if (j.status === "failed" || j.status === "cancelled") throw new Error(j?.error?.message || j.status);
          await sleep(300);
        }
        throw new Error("Timed out waiting for job");
      }

      resetBtn.addEventListener("click", () => {
        if (!capabilities) return;
        renderControlsFromCapabilities(capabilities);
      });

      (async () => {
        try {
          const r = await fetch("/v1/capabilities");
          capabilities = await r.json();
          renderControlsFromCapabilities(capabilities);
        } catch (e) {
          controlsHintEl.textContent = "Failed to load /v1/capabilities.";
        }
      })();

      btn.addEventListener("click", async () => {
        btn.disabled = true;
        try {
          const text = document.getElementById("text").value.trim();
          const voice = document.getElementById("voice").value;
          const snapcast = document.getElementById("snapcast").checked;
          if (!text) throw new Error("Text is empty");

          player.removeAttribute("src");
          player.load();

          const body = { text, voice_id: voice, output_format: "wav" };
          const controls = currentControlsPayload();
          if (controls) body.controls = controls;
          if (snapcast) body.playback = { mode: "snapcast", pre_chime: true };

          setStatus("Submitting…");
          const r = await fetch("/v1/tts/synthesize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const enq = await r.json();
          if (!r.ok) throw new Error(enq?.error?.message || "Request failed");
          setStatus(enq);

          const job = await pollJob(enq.status_url);
          const url = job?.result?.result_url;
          if (!url) throw new Error("No result_url on succeeded job");

          // Use the presigned URL directly.
          player.src = url;
          await player.play();
        } catch (e) {
          setStatus({ error: String(e) });
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
