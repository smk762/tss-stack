name: docker-release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

env:
  MINIO_ROOT_USER: ci
  MINIO_ROOT_PASSWORD: ci-minio

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  docker_release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway
            context: .
            dockerfile: ./services/gateway/Dockerfile
          - name: xtts
            context: .
            dockerfile: ./services/xtts/Dockerfile
          - name: xtts-glue
            context: .
            dockerfile: ./glue/Dockerfile
          - name: tts-worker
            context: .
            dockerfile: ./services/tts-worker/Dockerfile
          - name: whisper-worker
            context: .
            dockerfile: ./services/whisper-worker/Dockerfile
    name: ${{ matrix.name }}
    uses: smk762/gha-docker-shared-ci/.github/workflows/docker-release.yml@main
    with:
      image: ${{ vars.DOCKERHUB_ORG || secrets.DOCKERHUB_USERNAME || github.repository_owner }}/tss-stack-${{ matrix.name }}
      context: ${{ matrix.context }}
      dockerfile: ${{ matrix.dockerfile }}
      platforms: linux/amd64
      push_on_main: true
      push_on_tag: true
      sign_with_cosign: false
      trivy_fail_severity: CRITICAL
    secrets: inherit
