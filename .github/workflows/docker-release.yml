name: docker-release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  docker_release:
    env:
      MINIO_ROOT_USER: ci
      MINIO_ROOT_PASSWORD: ci-minio
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway
            context: ./services/gateway
          - name: xtts
            context: ./services/xtts
          - name: xtts-glue
            context: ./glue
          - name: tts-worker
            context: ./services/tts-worker
          - name: whisper-worker
            context: ./services/whisper-worker
    name: ${{ matrix.name }}
    uses: smk762/gha-docker-shared-ci/.github/workflows/docker-release.yml@main
    with:
      image: ${{ vars.DOCKERHUB_ORG || secrets.DOCKERHUB_USERNAME || github.repository_owner }}/tss-stack-${{ matrix.name }}
      context: ${{ matrix.context }}
      dockerfile: Dockerfile
      platforms: linux/amd64
      push_on_main: true
      push_on_tag: true
      sign_with_cosign: false
      trivy_fail_severity: CRITICAL
    secrets: inherit
