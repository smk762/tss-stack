name: docker-ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  MINIO_ROOT_USER: ci
  MINIO_ROOT_PASSWORD: ci-minio

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker_ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway
            context: .
            dockerfile: ./services/gateway/Dockerfile
          - name: xtts
            context: .
            dockerfile: ./services/xtts/Dockerfile
          - name: xtts-glue
            context: .
            dockerfile: ./glue/Dockerfile
          - name: tts-worker
            context: .
            dockerfile: ./services/tts-worker/Dockerfile
          - name: whisper-worker
            context: .
            dockerfile: ./services/whisper-worker/Dockerfile
    name: ${{ matrix.name }}
    uses: smk762/gha-docker-shared-ci/.github/workflows/docker-ci.yml@main
    with:
      image: ${{ vars.DOCKERHUB_ORG || github.repository_owner }}/tss-stack-${{ matrix.name }}
      context: ${{ matrix.context }}
      dockerfile: ${{ matrix.dockerfile }}
      compose_files: docker-compose.yml
      trivy_fail_severity: CRITICAL,HIGH
    secrets: inherit
